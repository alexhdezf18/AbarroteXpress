version: "3.8"

services:
  postgres-db:
    image: postgis/postgis:15-3.3-alpine
    platform: linux/amd64
    container_name: abarrote_xpress_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=abarrote_db
    ports:
      - "5432:5432"
    volumes:
      - abarrote_pg_data:/var/lib/postgresql/data
    restart: always

volumes:
  abarrote_pg_data:
